name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 25.8
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build executable
        run: npm run build

      - name: Package executable (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp dist/main "release/main"
          chmod +x release/main
          tar -czf "${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.platform }}-${{ runner.arch }}.tar.gz" -C release main

      - name: Package executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item -Path dist/main.exe -Destination release/main.exe -Force
          Compress-Archive -Path release/main.exe -DestinationPath "${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.platform }}-${{ runner.arch }}.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ runner.arch }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/**/*
